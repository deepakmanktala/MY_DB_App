server.port=8080

# H2 in-memory database (swap to MySQL/PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:jobfinderdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Crawler settings
crawler.request-delay-ms=500
crawler.timeout-ms=15000
crawler.max-concurrency=5

# CORS — allows Angular dev server on port 4200
cors.allowed-origins=http://localhost:4200