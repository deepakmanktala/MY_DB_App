server.port=8081

spring.datasource.url=jdbc:h2:mem:jobfinderandroid;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# CORS — allow Android emulator (10.0.2.2 maps to host localhost)
cors.allowed-origins=http://10.0.2.2:8081,http://localhost:8081

# JWT secret (change in production)
jwt.secret=YourJobFinderSecretKey2024DeepakManktala
jwt.expiration-ms=86400000

crawler.request-delay-ms=500
crawler.timeout-ms=15000
crawler.max-concurrency=5
